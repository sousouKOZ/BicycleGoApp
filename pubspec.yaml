name: bicycle_go
description: A simple bicycle app scaffold
version: 0.0.1
environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  google_maps_flutter: ^2.7.0
  geolocator: ^10.1.0
  nfc_manager: ^3.5.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  http: ^1.2.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  shared_preferences: ^2.3.2


flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  nfc_manager:
    path: third_party/nfc_manager
